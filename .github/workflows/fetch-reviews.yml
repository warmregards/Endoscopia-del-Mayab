name: Fetch Google reviews

# Refreshes data/reviews.json from the Places API once a day. The website reads
# the committed JSON — it never calls the Places API at runtime — so this is the
# ONLY place Places billing is incurred (~30 calls/month, inside the free cap).

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: fetch-reviews
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch reviews
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: npx -y tsx scripts/fetch-reviews.ts

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/reviews.json
          if git diff --cached --quiet -- data/reviews.json; then
            echo "No review changes."
            exit 0
          fi
          git commit -m "chore: refresh reviews"
          # Push with rebase-retry: shares the 06:00 UTC slot with
          # dump-ref-codes, so a plain push often loses the race and is rejected
          # non-fast-forward. Only data/reviews.json changes → clean rebase.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected (attempt $attempt) — rebasing on latest main…"
            git pull --rebase --autostash origin main
          done
          echo "::error::Failed to push reviews after 5 attempts."
          exit 1
