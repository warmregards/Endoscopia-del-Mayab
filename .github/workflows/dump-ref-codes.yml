name: Dump ref-code ledger

# Dumps every WhatsApp ref-code record from Vercel KV to data/ref-codes.csv once
# a day. The committed CSV is the join source for the monthly offline-conversion
# reconciliation (scripts/reconcile-conversions.py). KV is the source of truth;
# this is just a flat, version-controlled snapshot of it.

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: dump-ref-codes
  cancel-in-progress: false

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Dump ref codes
        env:
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
        run: node scripts/dump-ref-codes.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ref-codes.csv
          git diff --cached --quiet -- data/ref-codes.csv \
            || git commit -m "chore: refresh ref-code ledger"
          git push
