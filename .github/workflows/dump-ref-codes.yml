name: Dump ref-code ledger

# Dumps every WhatsApp ref-code record from Vercel KV to data/ref-codes.csv once
# a day. The committed CSV is the join source for the monthly offline-conversion
# reconciliation (scripts/reconcile-conversions.py). KV is the source of truth;
# this is just a flat, version-controlled snapshot of it.

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: dump-ref-codes
  cancel-in-progress: false

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Dump ref codes
        env:
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
        run: node scripts/dump-ref-codes.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ref-codes.csv
          if git diff --cached --quiet -- data/ref-codes.csv; then
            echo "No ledger changes."
            exit 0
          fi
          git commit -m "chore: refresh ref-code ledger"
          # Push with rebase-retry: this workflow shares the 06:00 UTC slot with
          # fetch-reviews (and manual/local pushes race too), so a plain push
          # often loses to a concurrent commit and is rejected non-fast-forward.
          # Our commit only touches data/ref-codes.csv, so rebasing onto whatever
          # landed is always a clean, conflict-free replay.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected (attempt $attempt) — rebasing on latest main…"
            git pull --rebase --autostash origin main
          done
          echo "::error::Failed to push ref-code ledger after 5 attempts."
          exit 1
