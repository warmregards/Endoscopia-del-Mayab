name: Offline conversions (daily)

# Reconciles PrepSync bookings (Supabase) into TWO Google Ads upload files for the
# "Cita Realizada" action, deduped by Order ID (appointment uuid):
#   - data/offline-conversions.csv      — gclid Offline Conversion Import (~7%, ref-coded)
#   - data/enhanced-conversions.csv     — Enhanced Conversions for Leads (hashed phone, ~all)
# Supabase is the source of truth (PrepSync pushes daily), so both are fully
# derived and safe to regenerate/overwrite every run.
#
# The files are then mirrored into a Google Sheet (push-to-sheet.py) so Google Ads
# can ingest them via a *scheduled* Google Sheets upload — no manual weekly upload.
# Sheet ID + the service account are in the "Push conversions to Google Sheet" step.

on:
  schedule:
    - cron: "0 7 * * *" # daily 07:00 UTC = 01:00 Mérida (Yucatán is UTC-6, no DST).
                        # 1h after the 06:00 UTC ref-code/reviews refresh, so the ledger is fresh.
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: weekly-offline-conversions
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Reconcile bookings → offline conversions (gclid + ECL)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python scripts/reconcile-conversions.py \
            --from-supabase \
            --out data/offline-conversions.csv \
            --adjustments-out data/offline-conversion-retractions.csv \
            --ecl-out data/enhanced-conversions.csv \
            --ecl-adjustments-out data/enhanced-conversion-adjustments.csv

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/offline-conversions.csv data/offline-conversion-retractions.csv \
                  data/enhanced-conversions.csv data/enhanced-conversion-adjustments.csv
          if git diff --cached --quiet; then
            echo "No conversion changes."
            exit 0
          fi
          git commit -m "chore: refresh weekly offline conversions"
          # Push with rebase-retry to survive a concurrent push to main.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected (attempt $attempt) — rebasing on latest main…"
            git pull --rebase --autostash origin main
          done
          echo "::error::Failed to push offline conversions after 5 attempts."
          exit 1

      - name: Push conversions to Google Sheet (for scheduled Ads upload)
        env:
          # Same service account as the SEO workflow. push-to-sheet.py prints the
          # SA email it authenticates as — the Sheet must be shared (Editor) with it.
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          pip install --quiet google-api-python-client google-auth
          # One feed per spreadsheet, written to each sheet's FIRST tab (what a
          # scheduled Google Ads upload reads). Retraction feeds are intentionally
          # not pushed — reconcile still writes their CSVs for audit/history.
          # gclid Offline Conversion Import (Google Click ID):
          python scripts/push-to-sheet.py \
            --sheet-id "1MXXLoaRyCm1RmXmOW_gAWJpIll09TeTUgpVMp5Zs-qo" \
            --csv data/offline-conversions.csv
          # Enhanced Conversions for Leads (hashed phone) — its own sheet:
          python scripts/push-to-sheet.py \
            --sheet-id "1pJBzmvwxrhi4i_v6I1FHCUrV42ZwtUa7skU_YZxfeJE" \
            --csv data/enhanced-conversions.csv
