name: Diagnose Supabase appointments

# One-off diagnostic (manual only): inspect the Supabase `appointments` table to
# see why reconcile pulls 0 rows. Read-only, no commit, no PII in the log.

on:
  workflow_dispatch: {}

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Inspect appointments
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/diagnose-supabase.py
